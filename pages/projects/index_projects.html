<body class="flex min-h-screen flex-col bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-200">
    <!-- Preloader for this page -->
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <!-- Navbar Section -->
    <header-navbar class="sticky top-0 z-20 w-full flex-none"></header-navbar>

    <main class="grow px-4">
        <div class="flex items-center justify-center gap-8 py-4 md:py-8 lg:gap-16">
            <!-- Input search -->
            <form class="mr-8 max-w-md">
                <label for="search" class="sr-only mb-2.5 block text-sm font-medium text-heading"
                    >Search</label
                >
                <div class="relative">
                    <div
                        class="pointer-events-none absolute inset-y-0 inset-s-0 flex items-center ps-3"
                    >
                        <svg
                            class="h-4 w-4 text-body"
                            aria-hidden="true"
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            fill="none"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke="currentColor"
                                stroke-linecap="round"
                                stroke-width="2"
                                d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                            />
                        </svg>
                    </div>
                    <input
                        type="search"
                        id="search"
                        data-search-target=".card"
                        data-search-scope="#container-project-cards"
                        class="block w-full rounded-base border border-default-medium bg-neutral-secondary-medium p-3 ps-9 text-sm text-heading shadow-xs placeholder:text-body focus:border-brand focus:ring-brand"
                        placeholder="Search"
                        required
                    />
                    <button
                        type="button"
                        class="absolute inset-e-1.5 bottom-1.5 box-border rounded border border-transparent bg-brand px-3 py-1.5 text-xs leading-5 font-medium text-white shadow-xs hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium focus:outline-none"
                    >
                        Search
                    </button>
                </div>
            </form>

            <!-- Filter dropdown -->
            <button
                id="button-filter-tags"
                data-dropdown-toggle="dropdown-filter-tags"
                class="inline-flex items-center rounded-lg bg-blue-700 px-5 py-2.5 text-center text-sm font-medium text-white hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 focus:outline-none dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
                type="button"
            >
                Filter
                <svg
                    class="ms-3 h-2.5 w-2.5"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 10 6"
                >
                    <path
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="m1 1 4 4 4-4"
                    />
                </svg>
            </button>
            <div
                id="dropdown-filter-tags"
                class="z-10 hidden w-48 divide-y divide-gray-100 rounded-lg bg-white shadow dark:divide-gray-600 dark:bg-gray-700"
            >
                <ul
                    id="checkbox-list"
                    class="h-48 space-y-3 overflow-y-auto p-3 text-sm text-gray-700 dark:text-gray-200"
                    aria-labelledby="dropdownCheckboxButton"
                >
                    <li>
                        <checkbox-badge
                            color-scheme="programming-languages"
                            ,
                            data-tag="Qt"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="programming-languages"
                            ,
                            data-tag="MATLAB"

                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="programming-languages"
                            ,
                            data-tag="C++"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="programming-languages"
                            ,
                            data-tag="Arduino"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="statistics"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="embedded-systems"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="aircraft-design"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="simulation"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="optimization"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="3D-printing"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            ,
                            data-tag="orbital-mechanics"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="tech-areas"
                            data-tag="control"

                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="domain-industry"

                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="domain-industry"
                            ,
                            data-tag="aerospace"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="scale-collaboration-type"
                            ,
                            data-tag="personal"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge
                            color-scheme="scale-collaboration-type"
                            ,
                            data-tag="professional"
                        ></checkbox-badge>
                    </li>
                    <li>
                        <checkbox-badge color-scheme="skills" , data-tag="test"></checkbox-badge>
                    </li>
                </ul>
            </div>

            <div id="active-bagdes" class="flex flex-wrap items-center justify-center py-4 md:py-8">
                <badge-filter color-scheme="programming-languages" data-tag="Qt"></badge-filter>
                <badge-filter color-scheme="programming-languages" data-tag="MATLAB"></badge-filter>
                <badge-filter color-scheme="programming-languages" data-tag="C++"></badge-filter>
